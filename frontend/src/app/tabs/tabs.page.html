<div class="tabs-shell" [class.search-open]="isSearchOpen">

  <!-- TOP BAR -->
  <div class="global-topbar" *ngIf="!isProfileRoute">
    <div class="global-topbar-inner">
      <button type="button" class="brand-btn" (click)="openHome()">
        <span class="brand-text">Study</span><span class="brand-accent">Buddy</span>
      </button>

      <div class="topbar-spacer" aria-hidden="true"></div>

      <button
        type="button"
        class="avatar-btn"
        aria-label="Vai al profilo"
        (click)="openProfile()"
      >
        <img
          [src]="profileAvatar || fallbackAvatar"
          (error)="onAvatarError($event)"
          alt="Avatar profilo"
        />
        <span class="avatar-ring"></span>
      </button>
    </div>
  </div>

  <!-- TABS -->
  <ion-tabs>
    <ion-tab-bar slot="bottom" class="custom-tab-bar">

      <ion-tab-button tab="home" class="custom-tab-btn">
        <ion-icon name="home-outline"></ion-icon>
        <ion-label>Home</ion-label>
      </ion-tab-button>

      <ion-tab-button tab="notes" class="custom-tab-btn">
        <ion-icon name="document-text-outline"></ion-icon>
        <ion-label>Appunti</ion-label>
      </ion-tab-button>

      <ion-tab-button tab="groups" class="custom-tab-btn">
        <ion-icon name="people-outline"></ion-icon>
        <ion-label>Gruppi</ion-label>
      </ion-tab-button>

      <ion-tab-button tab="planner" class="custom-tab-btn">
        <ion-icon name="calendar-outline"></ion-icon>
        <ion-label>Planner</ion-label>
      </ion-tab-button>

    </ion-tab-bar>
  </ion-tabs>

  <app-search-overlay
    *ngIf="isSearchOpen"
    (close)="closeSearchOverlay()"
  ></app-search-overlay>
</div>
