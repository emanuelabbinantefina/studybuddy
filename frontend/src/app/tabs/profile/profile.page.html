<ion-header translucent="true">
  <ion-toolbar>
    <ion-title>Profilo</ion-title>
    <ion-buttons slot="end">
      <ion-button fill="clear">
        <ion-icon name="settings-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content fullscreen *ngIf="user as u">
  <div class="profile-wrapper">

    <!-- intestazione con avatar -->
    <section class="profile-header">
      <div class="avatar">
        <ion-avatar *ngIf="u.avatarUrl; else initials">
          <img [src]="u.avatarUrl" alt="Avatar" />
        </ion-avatar>
        <ng-template #initials>
          <div class="avatar-placeholder">
            {{ u.name[0] }}
          </div>
        </ng-template>
      </div>

      <h2>{{ u.name }}</h2>

      <div class="stats-row" *ngIf="u.stats">
        <div class="stat">
          <span class="stat__value">{{ u.stats.groups }}</span>
          <span class="stat__label">Gruppi</span>
        </div>
        <div class="stat">
          <span class="stat__value">{{ u.stats.eventsThisWeek }}</span>
          <span class="stat__label">Eventi</span>
        </div>
      </div>
    </section>

    <!-- sezione appunti / gruppi -->
<section>
  <ion-segment value="saved">
    <ion-segment-button value="saved">
      <ion-label>Appunti salvati</ion-label>
    </ion-segment-button>
    <ion-segment-button value="groups">
      <ion-label>I tuoi gruppi</ion-label>
    </ion-segment-button>
  </ion-segment>
</section>

<!-- Appunti recenti (mock, usa events) -->
<section>
  <h3 class="section-subtitle">Appunti recenti</h3>
  <ion-list lines="none">
    <ion-item class="recent-note">
      <ion-icon name="document-text-outline" slot="start"></ion-icon>
      <ion-label>
        <h2>Appunti Analisi 2</h2>
        <p>Matematica · 1 ora fa</p>
      </ion-label>
    </ion-item>
    <ion-item class="recent-note">
      <ion-icon name="document-text-outline" slot="start"></ion-icon>
      <ion-label>
        <h2>Circuiti elettrici</h2>
        <p>Fisica · 3 giorni fa</p>
      </ion-label>
    </ion-item>
  </ion-list>
</section>

<!-- azioni -->
<section>
  <ion-list lines="full">
    <ion-item button (click)="onEditProfile()">
      <ion-icon name="person-circle-outline" slot="start"></ion-icon>
      <ion-label>Modifica profilo</ion-label>
    </ion-item>

    <ion-item button>
      <ion-icon name="notifications-outline" slot="start"></ion-icon>
      <ion-label>Promemoria</ion-label>
    </ion-item>

    <ion-item button>
      <ion-icon name="stats-chart-outline" slot="start"></ion-icon>
      <ion-label>Statistiche studio</ion-label>
    </ion-item>

    <ion-item button lines="none" (click)="onLogout()">
      <ion-icon name="log-out-outline" slot="start" color="danger"></ion-icon>
      <ion-label color="danger">Esci</ion-label>
    </ion-item>
  </ion-list>
</section>
