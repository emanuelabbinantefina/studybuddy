<ion-content [fullscreen]="true" class="bg-light">
  <div class="header-background">
    <div class="header-top">
      <div class="brand">
        <ion-icon name="school" style="font-size: 24px; color: #312E81;"></ion-icon>
        <span style="margin-left: 8px;">Profilo</span>
      </div>
      <div class="notification-box" (click)="onReminders()">
        <ion-icon name="notifications-outline"></ion-icon>
        <div class="dot"></div>
      </div>
    </div>
  </div>

  <div class="main-container">
    <div class="profile-section">
      <div class="avatar-wrapper" (click)="onEditProfile()">
        <img [src]="user?.avatar || fallbackAvatar" (error)="onAvatarError($event)" alt="avatar">
      </div>
      <h2>{{ user?.nome || 'Emanuela' }}</h2>
      <p class="profile-bio" *ngIf="user?.bio">{{ (user?.bio || '') | slice:0:120 }}</p>
      <p class="profile-facolta" *ngIf="user?.facolta">{{ user?.facolta }}</p>
    </div>

    <div class="stats-card" (click)="onStats()">
      <div class="stat-col">
        <span class="value">{{ user?.esamiTotali || 0 }}</span>
        <span class="label">Gruppi</span>
      </div>
      <div class="vertical-divider"></div>
      <div class="stat-col">
        <span class="value">{{ user?.cfu || 0 }}</span>
        <span class="label">Appunti</span>
      </div>
    </div>

    <div class="quick-actions">
      <div class="action-btn" (click)="onSavedNotes()">
        <ion-icon name="bookmark-outline"></ion-icon>
        <span>Appunti salvati</span>
      </div>
      <div class="action-btn" (click)="onMyGroups()">
        <ion-icon name="people-outline"></ion-icon>
        <span>I tuoi gruppi</span>
      </div>
    </div>

    <div class="section-title" (click)="onSavedNotes()">
      <h3>Appunti recenti</h3>
      <ion-icon name="chevron-forward"></ion-icon>
    </div>

    <div class="notes-list">
      <div class="note-item" (click)="onViewNote('Analisi 2')">
        <div class="icon-box orange">
          <ion-icon name="bookmark"></ion-icon>
        </div>
        <div class="text-info">
          <h4>Appunti Analisi 2</h4>
          <p>Matematica · 1 ora fa</p>
        </div>
      </div>
    </div>

    <div class="menu-list">
      <div class="menu-item" (click)="onEditProfile()">
        <div class="left">
          <ion-icon name="settings-outline"></ion-icon>
          <span>Modifica profilo</span>
        </div>
        <ion-icon name="chevron-forward"></ion-icon>
      </div>
      <div class="menu-item danger" (click)="onLogout()">
        <div class="left">
          <ion-icon name="log-out-outline"></ion-icon>
          <span>Esci</span>
        </div>
      </div>
    </div>
  </div>
</ion-content>
