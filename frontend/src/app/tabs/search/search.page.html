<ion-header translucent="true">
  <ion-toolbar>
    <ion-title>Cerca</ion-title>
    <ion-buttons slot="end">
      <ion-button fill="clear">
        <ion-icon name="person-add-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content fullscreen>
  <div class="search-wrapper">

    <div class="chip-row">
      <button
        class="chip"
        [class.chip--active]="tab === 'notes'"
        (click)="changeTab('notes')">
        Appunti
      </button>
      <button
        class="chip"
        [class.chip--active]="tab === 'groups'"
        (click)="changeTab('groups')">
        Gruppi
      </button>
      <button
        class="chip"
        [class.chip--active]="tab === 'exams'"
        (click)="changeTab('exams')">
        Esami
      </button>
    </div>

    <ion-searchbar
      placeholder="Cerca appunti, gruppi, esami..."
      (ionChange)="onSearchChange($event)">
    </ion-searchbar>

    <!-- APPUNTI -->
    <section *ngIf="tab === 'notes'">
      <h3 class="section-title">Appunti consigliati</h3>
      <ion-list lines="none">
        <ion-item *ngFor="let n of filteredNotes" class="note-card">
          <div class="note-icon">
            <ion-icon name="document-text-outline"></ion-icon>
          </div>
          <ion-label>
            <h2>{{ n.title }}</h2>
            <p class="note-subject">{{ n.subject }} · 1 ora fa</p>
          </ion-label>
          <ion-icon name="albums-outline" slot="end"></ion-icon>
        </ion-item>
      </ion-list>
    </section>

    <!-- GRUPPI -->
    <section *ngIf="tab === 'groups'">
      <h3 class="section-title">Gruppi suggeriti</h3>
      <ion-list lines="none">
        <ion-item *ngFor="let g of filteredGroups" class="group-suggest">
          <ion-label>
            <h2>{{ g.name }}</h2>
            <p>{{ g.description }}</p>
          </ion-label>
          <ion-button size="small" shape="round" (click)="onJoinGroup(g)">
            unisciti
          </ion-button>
        </ion-item>
      </ion-list>
    </section>

    <!-- ESAMI -->
    <section *ngIf="tab === 'exams'">
      <h3 class="section-title">Esami in scadenza</h3>
      <ion-list lines="none">
        <ion-item *ngFor="let e of filteredNotes | slice:0:3" class="note-card">
          <div class="note-icon exam">
            <ion-icon name="school-outline"></ion-icon>
          </div>
          <ion-label>
            <h2>{{ e.title }}</h2>
            <p class="note-subject">{{ e.subject }} · {{ e.date }}</p>
          </ion-label>
        </ion-item>
      </ion-list>
    </section>
  </div>
</ion-content>
