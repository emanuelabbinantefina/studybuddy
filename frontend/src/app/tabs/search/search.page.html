<ion-header class="ion-no-border">
  <ion-toolbar>
    <div class="header-title-container">
      <ion-icon name="search-outline" class="header-icon"></ion-icon>
      <span class="page-title">Cerca</span>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="bg-light">
  <div class="main-wrapper">

    <div class="tabs-row">
      <button class="tab-btn" [class.active]="tab === 'notes'" (click)="changeTab('notes')">Appunti</button>
      <button class="tab-btn" [class.active]="tab === 'groups'" (click)="changeTab('groups')">Gruppi</button>
      <button class="tab-btn" [class.active]="tab === 'exams'" (click)="changeTab('exams')">Esami</button>
    </div>

    <div class="search-container">
      <input type="text" class="custom-input" placeholder="Cerca..." [(ngModel)]="query" (input)="onSearchChange($event)">
      <div class="search-action-btn">
        <ion-icon name="search-outline"></ion-icon>
      </div>
    </div>

    <div *ngIf="tab === 'notes'" class="fade-in">
      <div class="cards-list">
        <div class="custom-card" *ngFor="let n of filteredNotes">
          <div class="icon-box" [ngClass]="getIconColor(n.tipoFile)">
            <ion-icon name="document-text"></ion-icon>
          </div>
          
          <div class="card-info">
            <h4>{{ n.titolo }}</h4>
            <p>{{ n.materia }} <span class="dot">·</span> {{ n.tempoUpload }}</p>
          </div>
          
          <div class="doc-preview">
            <div class="doc-lines"><span></span><span></span></div>
          </div>
        </div>
      </div>
    </div>

    <div *ngIf="tab === 'groups'" class="fade-in">
      <div class="cards-list">
        <div class="custom-card" *ngFor="let g of filteredGroups">
          <div class="icon-box circle" [ngClass]="g.colorClass || 'bg-blue'">
            <span class="char">{{ g.nome.charAt(0) }}</span>
          </div>
          <div class="card-info">
            <h4>{{ g.nome }}</h4>
            <p>{{ g.materia }} <span class="dot">·</span> {{ g.membersCount || 0 }} membri</p>
          </div>
          <button
            class="join-btn"
            [class.member]="g.isMember"
            [disabled]="g.isMember || joiningGroupId === g.id"
            (click)="joinGroup(g)">
            {{ g.isMember ? 'Già dentro' : (joiningGroupId === g.id ? '...' : 'Unisciti') }}
          </button>
        </div>
      </div>
    </div>

    <div *ngIf="tab === 'exams'" class="fade-in">
      <div class="cards-list">
        <div class="custom-card" *ngFor="let e of filteredExams">
          <div class="icon-box red-pdf">
            <ion-icon name="document-text"></ion-icon>
          </div>
          <div class="card-info">
            <h4>{{ e.titolo }}</h4>
            <p>{{ e.materia }}</p>
          </div>
        </div>
      </div>
    </div>

  </div>
</ion-content>
