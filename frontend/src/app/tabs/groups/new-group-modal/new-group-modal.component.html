<ion-content class="modal-bg">
  <section class="modal-card">
    <header class="modal-header">
      <div>
        <h2>Crea gruppo studio</h2>
        <p>Step {{ step }} di 2</p>
      </div>

      <button type="button" class="close-btn" (click)="cancel()">&times;</button>
    </header>

    <div class="steps-track">
      <span [class.active]="step >= 1"></span>
      <span [class.active]="step >= 2"></span>
    </div>

    <section *ngIf="step === 1" class="step-pane">
      <label>NOME DEL GRUPPO</label>
      <input type="text" maxlength="60" placeholder="Es. Analisi II - Sessione giugno" [(ngModel)]="groupName">

      <label>FACOLTA</label>
      <div class="chips-wrap">
        <button
          type="button"
          class="chip"
          *ngFor="let faculty of faculties"
          [class.active]="selectedFacultyId === faculty.id"
          (click)="selectFaculty(faculty)">
          {{ faculty.name }}
        </button>
      </div>

      <label>MATERIA</label>
      <div class="chips-wrap">
        <button
          type="button"
          class="chip"
          *ngFor="let subject of subjectOptions"
          [class.active]="selectedSubject === subject"
          (click)="selectedSubject = subject">
          {{ subject }}
        </button>
      </div>

      <label>DATA ESAME (OPZIONALE)</label>
      <input type="date" [(ngModel)]="examDate">
    </section>

    <section *ngIf="step === 2" class="step-pane">
      <article class="preview-card">
        <div class="icon-box" [ngClass]="selectedColorClass">{{ groupName ? groupName.charAt(0) : '?' }}</div>

        <div>
          <h3>{{ groupName || 'Nome gruppo' }}</h3>
          <p>{{ selectedFacultyName || 'Facolta' }} · {{ selectedSubject || 'Materia' }}</p>
          <small>Creato da studenti</small>
        </div>
      </article>

      <label>COLORE</label>
      <div class="color-row">
        <button
          type="button"
          class="color-dot"
          *ngFor="let color of colorOptions"
          [ngClass]="[color, selectedColorClass === color ? 'active' : '']"
          (click)="selectedColorClass = color">
        </button>
      </div>

      <label>PRIMO MESSAGGIO IN BACHECA (OPZIONALE)</label>
      <textarea
        rows="4"
        maxlength="1000"
        placeholder="Es. Qui condividiamo avvisi, materiali e aggiornamenti utili"
        [(ngModel)]="boardMessage">
      </textarea>

      <label>DOMANDE D'ESAME INIZIALI (OPZIONALE)</label>
      <div class="question-row">
        <input type="text" maxlength="500" placeholder="Inserisci una domanda" [(ngModel)]="questionDraft">
        <select [(ngModel)]="questionSessionDraft">
          <option value="">Sessione (opzionale)</option>
          <option *ngFor="let session of questionSessionOptions" [value]="session">
            {{ session }}
          </option>
        </select>
        <input
          type="text"
          inputmode="numeric"
          maxlength="4"
          placeholder="Anno"
          [ngModel]="questionYearDraft"
          (ngModelChange)="onQuestionYearChange($event)">
        <button type="button" class="add-question-btn" (click)="addSeedQuestion()">Aggiungi</button>
      </div>

      <div class="seed-questions" *ngIf="seedQuestions.length > 0">
        <article class="seed-question-card" *ngFor="let item of seedQuestions; let i = index">
          <div>
            <strong>{{ item.question }}</strong>
            <p *ngIf="item.session || item.year">{{ item.session }}<span *ngIf="item.session && item.year"> </span>{{ item.year }}</p>
          </div>

          <button type="button" class="remove-btn" (click)="removeSeedQuestion(i)">×</button>
        </article>
      </div>
    </section>

    <footer class="modal-actions">
      <button type="button" class="btn secondary" *ngIf="step > 1" (click)="prevStep()">Indietro</button>
      <button type="button" class="btn primary" *ngIf="step === 1" [disabled]="!canContinueStep1()" (click)="nextStep()">
        Continua
      </button>
      <button type="button" class="btn primary" *ngIf="step === 2" [disabled]="!canCreate()" (click)="createGroup()">
        {{ creating ? 'Creazione...' : 'Crea gruppo' }}
      </button>
    </footer>
  </section>
</ion-content>
