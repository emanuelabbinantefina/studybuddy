<ion-content [fullscreen]="true" class="complete-profile-content">
  <div class="complete-profile-page">

    <button type="button" class="page-back-btn fade-in" (click)="goBack()" aria-label="Torna indietro">
      <ion-icon name="arrow-back-outline"></ion-icon>
    </button>

    <div class="bg-blob bg-blob--1"></div>
    <div class="bg-blob bg-blob--2"></div>

    <div class="complete-profile-shell">

      <div class="brand-block fade-in">
        <h1 class="hero-title">Completa il profilo</h1>
        <p class="hero-subtitle">Aggiungi una foto e una breve bio</p>
      </div>

      <div class="complete-profile-card fade-in">
        <app-profile-editor
          variant="page"
          title=""
          submitLabel="Completa"
          [showClose]="false"
          (saved)="onSaved($event)"
        ></app-profile-editor>
      </div>

    </div>
  </div>
</ion-content>
