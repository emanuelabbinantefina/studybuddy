<ion-content [fullscreen]="true">
  
  <div class="auth-container">

    <div class="auth-card">

      <div class="card-header">
        <h2>Il tuo Profilo</h2>
        <p>Completa i dati per iniziare</p>
      </div>

      <div class="avatar-section">
        <div class="avatar-carousel">
          
          <div class="avatar-item upload-btn" (click)="uploadPhoto()">
            <div class="icon-box">
              <ion-icon name="camera-outline"></ion-icon>
            </div>
            <span>Carica</span>
          </div>

          <div class="avatar-item" *ngFor="let avatar of avatarOptions"
            [class.selected]="profileData.avatarUrl === avatar" (click)="selectAvatar(avatar)">
            <img [src]="avatar">
            <div class="check-indicator" *ngIf="profileData.avatarUrl === avatar">
              <ion-icon name="checkmark-circle"></ion-icon>
            </div>
          </div>

        </div>
      </div>

      <div class="divider"><span>Informazioni</span></div>

      <div class="input-group">
        <div class="custom-input">
          <ion-icon name="person-outline"></ion-icon>
          <input type="text" [(ngModel)]="profileData.nickname" placeholder="Nickname">
        </div>

        <div class="custom-input textarea-input">
          <ion-icon name="chatbox-ellipses-outline"></ion-icon>
          <ion-textarea [(ngModel)]="profileData.bio" autoGrow="true" rows="1" maxlength="120" placeholder="Scrivi una breve bio..."></ion-textarea>
        </div>
        <div class="bio-counter">{{ (profileData.bio?.length || 0) }}/120</div>
      </div>

      <div class="action-area">
        <button class="btn-login-style" (click)="saveProfile()">COMPLETA</button>
      </div>

    </div> </div> <input type="file" accept="image/*" #fileInput (change)="onFileSelected($event)" style="display: none;">

</ion-content>
