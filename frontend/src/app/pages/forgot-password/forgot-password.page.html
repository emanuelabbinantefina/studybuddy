<ion-content [fullscreen]="true" class="forgot-content">
  <div class="forgot-page">

    <button type="button" class="page-back-btn fade-in" (click)="goBack()" aria-label="Torna indietro">
      <ion-icon name="arrow-back-outline"></ion-icon>
    </button>

    <div class="bg-blob bg-blob--1"></div>
    <div class="bg-blob bg-blob--2"></div>
    <div class="bg-blob bg-blob--3"></div>

    <div class="forgot-shell">

      <div class="brand-block fade-in">
        <div class="icon-badge">
          <ion-icon name="lock-closed-outline"></ion-icon>
        </div>
        <h1 class="hero-title">Password dimenticata?</h1>
        <p class="hero-subtitle">
          Inserisci la tua email e ti invieremo il link per il reset.
        </p>
      </div>

      <div class="forgot-card fade-in">
        <form (ngSubmit)="handleResetPassword()">

          <div class="field">
            <label class="field-label">Email</label>
            <div class="input-wrap">
              <ion-icon name="mail-outline" class="input-icon"></ion-icon>
              <ion-input
                name="email"
                [(ngModel)]="email"
                placeholder="Inserisci la tua email"
                type="email"
                inputmode="email"
                autocorrect="off"
                autocapitalize="off"
                required
              ></ion-input>
            </div>
          </div>

          <div class="message-box message-box--error" *ngIf="errorMessage">
            <ion-icon name="alert-circle-outline"></ion-icon>
            <span>{{ errorMessage }}</span>
          </div>

          <div class="message-box message-box--success" *ngIf="successMessage">
            <ion-icon name="checkmark-circle-outline"></ion-icon>
            <span>{{ successMessage }}</span>
          </div>

          <ion-button
            expand="block"
            class="submit-btn"
            type="submit"
            [disabled]="loading"
          >
            <ion-spinner name="crescent" *ngIf="loading"></ion-spinner>
            <span *ngIf="!loading">Invia link</span>
          </ion-button>
        </form>

        <button class="back-link" (click)="goBack()">
          <ion-icon name="arrow-back-outline"></ion-icon>
          <span>Torna al login</span>
        </button>
      </div>

    </div>
  </div>
</ion-content>
