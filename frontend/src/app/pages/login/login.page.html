<ion-content [fullscreen]="true" class="login-content">
  <div class="login-page">

    <!-- Background blobs -->
    <div class="bg-blob bg-blob--1"></div>
    <div class="bg-blob bg-blob--2"></div>
    <div class="bg-blob bg-blob--3"></div>

    <div class="login-shell">

      <!-- Brand -->
      <div class="brand-block fade-in">
        <h1 class="hero-title">Bentornato</h1>
        <p class="hero-subtitle">Pronto a studiare sul serio?</p>
      </div>

      <!-- Card -->
      <div class="login-card fade-in">
        <form (ngSubmit)="handleLogin()">

          <!-- Email -->
          <div class="field">
            <label class="field-label">Email</label>
            <div class="input-wrap">
              <ion-icon name="mail-outline" class="input-icon"></ion-icon>
              <ion-input
                type="email"
                inputmode="email"
                name="email"
                placeholder="Inserisci la tua email"
                [(ngModel)]="email"
                autocorrect="off"
                autocapitalize="off"
                required
              >
              </ion-input>
            </div>
          </div>

          <!-- Password -->
          <div class="field">
            <label class="field-label">Password</label>
            <div class="input-wrap">
              <ion-icon name="lock-closed-outline" class="input-icon"></ion-icon>
              <ion-input
                [type]="passwordType"
                name="password"
                placeholder="Inserisci la password"
                [(ngModel)]="password"
                required
              >
              </ion-input>
              <button
                type="button"
                class="password-toggle-btn"
                (click)="togglePasswordMode()"
              >
                <ion-icon [name]="passwordIcon"></ion-icon>
              </button>
            </div>
          </div>

          <!-- Options -->
          <div class="form-row">
            <div class="remember-wrapper" (click)="toggleRemember()">
              <div class="custom-checkbox" [class.checked]="rememberMe">
                <ion-icon name="checkmark"></ion-icon>
              </div>
              <span class="remember-text">Ricordami</span>
            </div>
          </div>

          <!-- Error -->
          <div class="error-box" *ngIf="error">
            <ion-icon name="alert-circle-outline"></ion-icon>
            <span>{{ error }}</span>
          </div>

          <!-- Submit -->
          <ion-button
            expand="block"
            class="main-btn"
            type="submit"
            [disabled]="loading"
          >
            <ion-spinner *ngIf="loading" name="crescent"></ion-spinner>
            <span *ngIf="!loading">Accedi</span>
          </ion-button>
        </form>

        <!-- Footer -->
        <div class="footer-links">
          <p>
            Non hai un account?
            <button type="button" class="link-primary" (click)="goToRegister()">
              Registrati
            </button>
          </p>
        </div>
      </div>

    </div>
  </div>
</ion-content>
