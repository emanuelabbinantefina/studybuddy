<ion-content [fullscreen]="true" class="register-content">
  <div class="register-page">

    <button type="button" class="page-back-btn fade-in" (click)="goBack()" aria-label="Torna indietro">
      <ion-icon name="arrow-back-outline"></ion-icon>
    </button>

    <!-- Background blobs -->
    <div class="bg-blob bg-blob--1"></div>
    <div class="bg-blob bg-blob--2"></div>
    <div class="bg-blob bg-blob--3"></div>

    <div class="register-shell">

      <!-- Header -->
      <div class="brand-block fade-in">
        <h1 class="hero-title">Crea account</h1>
      </div>

      <!-- Card -->
      <div class="register-card fade-in">
        <form (ngSubmit)="handleRegister()">

          <!-- Nome e Cognome in una riga -->
          <div class="field-row">
            <div class="field field--half">
              <label class="field-label">Nome</label>
              <div class="input-wrap">
                <ion-icon name="person-outline" class="input-icon"></ion-icon>
                <ion-input
                  type="text"
                  placeholder="Nome"
                  [(ngModel)]="firstName"
                  name="firstName"
                  required
                ></ion-input>
              </div>
            </div>

            <div class="field field--half">
              <label class="field-label">Cognome</label>
              <div class="input-wrap">
                <ion-input
                  type="text"
                  placeholder="Cognome"
                  [(ngModel)]="lastName"
                  name="lastName"
                  required
                ></ion-input>
              </div>
            </div>
          </div>

          <!-- Email con validazione in tempo reale -->
          <div class="field">
            <label class="field-label">Email</label>
            <div class="input-wrap" [class.input-wrap--error]="emailTouched && !isEmailValid" [class.input-wrap--success]="emailTouched && isEmailValid">
              <ion-icon name="mail-outline" class="input-icon"></ion-icon>
              <ion-input
                type="email"
                placeholder="La tua email"
                [(ngModel)]="email"
                name="email"
                (ionBlur)="onEmailBlur()"
                (ionInput)="onEmailInput()"
                required
              ></ion-input>
              <ion-icon 
                *ngIf="emailTouched && isEmailValid" 
                name="checkmark-circle" 
                class="input-status-icon input-status-icon--success"
              ></ion-icon>
              <ion-icon 
                *ngIf="emailTouched && !isEmailValid && email.length > 0" 
                name="close-circle" 
                class="input-status-icon input-status-icon--error"
              ></ion-icon>
            </div>
            <small class="field-error" *ngIf="emailTouched && !isEmailValid && email.length > 0">
              Inserisci un'email valida
            </small>
          </div>

          <!-- Corso -->
          <div class="field">
            <label class="field-label">Corso di laurea triennale</label>
            <button
              type="button"
              class="input-wrap input-wrap--select input-wrap--button"
              [class.input-wrap--placeholder]="!selectedCourseLabel"
              [disabled]="courseOptions.length === 0"
              (click)="openCoursePicker()"
            >
              <ion-icon name="school-outline" class="input-icon"></ion-icon>
              <span class="select-value">
                {{ selectedCourseLabel || 'Seleziona corso' }}
              </span>
              <ion-icon name="chevron-down-outline" class="select-chevron"></ion-icon>
            </button>
          </div>

          <!-- Password con occhio mostra/nascondi -->
          <div class="field">
            <label class="field-label">Password</label>
            <div class="input-wrap">
              <ion-icon name="lock-closed-outline" class="input-icon"></ion-icon>
              <ion-input
                [type]="showPassword ? 'text' : 'password'"
                placeholder="Crea una password"
                [(ngModel)]="password"
                name="password"
                minlength="8"
                required
              ></ion-input>
              <button 
                type="button" 
                class="password-toggle-btn" 
                (click)="toggleShowPassword()"
                [attr.aria-label]="showPassword ? 'Nascondi password' : 'Mostra password'"
              >
                <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
              </button>
            </div>
            <small class="field-hint">{{ passwordRulesMessage }}</small>
          </div>

          <!-- Conferma Password con occhio -->
          <div class="field">
            <label class="field-label">Conferma password</label>
            <div class="input-wrap" [class.input-wrap--error]="confirmPassword.length > 0 && password !== confirmPassword">
              <ion-icon name="lock-closed-outline" class="input-icon"></ion-icon>
              <ion-input
                [type]="showConfirmPassword ? 'text' : 'password'"
                placeholder="Ripeti la password"
                [(ngModel)]="confirmPassword"
                name="confirmPassword"
                minlength="8"
                required
              ></ion-input>
              <button 
                type="button" 
                class="password-toggle-btn" 
                (click)="toggleShowConfirmPassword()"
                [attr.aria-label]="showConfirmPassword ? 'Nascondi password' : 'Mostra password'"
              >
                <ion-icon [name]="showConfirmPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
              </button>
            </div>
            <small class="field-error" *ngIf="confirmPassword.length > 0 && password !== confirmPassword">
              Le password non coincidono
            </small>
          </div>

          <!-- Error -->
          <div class="error-box" *ngIf="error">
            <ion-icon name="alert-circle-outline"></ion-icon>
            <span>{{ error }}</span>
          </div>

          <!-- CTA -->
          <ion-button
            expand="block"
            class="main-btn"
            type="submit"
            [disabled]="loading"
          >
            <ion-spinner *ngIf="loading" name="crescent"></ion-spinner>
            <span *ngIf="!loading">Registrati</span>
          </ion-button>
        </form>

        <!-- Footer -->
        <div class="footer-links">
          <p>
            Hai già un account?
            <button type="button" class="link-primary" (click)="goBack()">
              Accedi
            </button>
          </p>
        </div>
      </div>

    </div>
  </div>

  <div class="course-picker-overlay" *ngIf="coursePickerOpen" (click)="closeCoursePicker()">
    <div class="course-picker-card fade-in" (click)="$event.stopPropagation()">
      <div class="course-picker-head">
        <div>
          <h3>Scegli il corso</h3>
          <p>Seleziona il tuo corso di laurea triennale</p>
        </div>
        <button type="button" class="course-picker-close" (click)="closeCoursePicker()">
          <ion-icon name="close-outline"></ion-icon>
        </button>
      </div>

      <div class="course-picker-search">
        <ion-icon name="search-outline"></ion-icon>
        <input
          type="text"
          placeholder="Cerca corso..."
          [(ngModel)]="courseSearchQuery"
        />
      </div>

      <div class="course-picker-list">
        <button
          type="button"
          class="course-option"
          *ngFor="let course of filteredCourseOptions"
          [class.course-option--active]="course.key === courseKey"
          (click)="selectCourse(course)"
        >
          <span>{{ course.label }}</span>
          <ion-icon *ngIf="course.key === courseKey" name="checkmark-outline"></ion-icon>
        </button>

        <div class="course-picker-empty" *ngIf="!filteredCourseOptions.length">
          Nessun corso trovato
        </div>
      </div>
    </div>
  </div>
</ion-content>
