<ion-content [fullscreen]="true" class="register-content">
  <div class="register-page">

    <!-- Background blobs -->
    <div class="bg-blob bg-blob--1"></div>
    <div class="bg-blob bg-blob--2"></div>
    <div class="bg-blob bg-blob--3"></div>

    <div class="register-shell">

      <!-- Header -->
      <div class="brand-block fade-in">
        <h1 class="hero-title">Crea account</h1>
      </div>

      <!-- Card -->
      <div class="register-card fade-in">
        <form (ngSubmit)="handleRegister()">

          <!-- Nome e Cognome in una riga -->
          <div class="field-row">
            <div class="field field--half">
              <label class="field-label">Nome</label>
              <div class="input-wrap">
                <ion-icon name="person-outline" class="input-icon"></ion-icon>
                <ion-input
                  type="text"
                  placeholder="Nome"
                  [(ngModel)]="firstName"
                  name="firstName"
                  required
                ></ion-input>
              </div>
            </div>

            <div class="field field--half">
              <label class="field-label">Cognome</label>
              <div class="input-wrap">
                <ion-input
                  type="text"
                  placeholder="Cognome"
                  [(ngModel)]="lastName"
                  name="lastName"
                  required
                ></ion-input>
              </div>
            </div>
          </div>

          <!-- Email con validazione in tempo reale -->
          <div class="field">
            <label class="field-label">Email</label>
            <div class="input-wrap" [class.input-wrap--error]="emailTouched && !isEmailValid" [class.input-wrap--success]="emailTouched && isEmailValid">
              <ion-icon name="mail-outline" class="input-icon"></ion-icon>
              <ion-input
                type="email"
                placeholder="La tua email"
                [(ngModel)]="email"
                name="email"
                (ionBlur)="onEmailBlur()"
                (ionInput)="onEmailInput()"
                required
              ></ion-input>
              <ion-icon 
                *ngIf="emailTouched && isEmailValid" 
                name="checkmark-circle" 
                class="input-status-icon input-status-icon--success"
              ></ion-icon>
              <ion-icon 
                *ngIf="emailTouched && !isEmailValid && email.length > 0" 
                name="close-circle" 
                class="input-status-icon input-status-icon--error"
              ></ion-icon>
            </div>
            <small class="field-error" *ngIf="emailTouched && !isEmailValid && email.length > 0">
              Inserisci un'email valida
            </small>
          </div>

          <!-- Corso -->
          <div class="field">
            <label class="field-label">Corso di laurea triennale</label>
            <div class="input-wrap input-wrap--select">
              <ion-icon name="school-outline" class="input-icon"></ion-icon>
              <ion-select
                placeholder="Seleziona corso"
                [(ngModel)]="courseKey"
                name="courseKey"
                [disabled]="courseOptions.length === 0"
                interface="action-sheet"
              >
                <ion-select-option
                  *ngFor="let course of courseOptions"
                  [value]="course.key"
                >
                  {{ course.label }}
                </ion-select-option>
              </ion-select>
            </div>
          </div>

          <!-- Password con occhio mostra/nascondi -->
          <div class="field">
            <label class="field-label">Password</label>
            <div class="input-wrap">
              <ion-icon name="lock-closed-outline" class="input-icon"></ion-icon>
              <ion-input
                [type]="showPassword ? 'text' : 'password'"
                placeholder="Crea una password"
                [(ngModel)]="password"
                name="password"
                minlength="8"
                required
              ></ion-input>
              <button 
                type="button" 
                class="password-toggle-btn" 
                (click)="toggleShowPassword()"
                [attr.aria-label]="showPassword ? 'Nascondi password' : 'Mostra password'"
              >
                <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
              </button>
            </div>
            <small class="field-hint">{{ passwordRulesMessage }}</small>
          </div>

          <!-- Conferma Password con occhio -->
          <div class="field">
            <label class="field-label">Conferma password</label>
            <div class="input-wrap" [class.input-wrap--error]="confirmPassword.length > 0 && password !== confirmPassword">
              <ion-icon name="lock-closed-outline" class="input-icon"></ion-icon>
              <ion-input
                [type]="showConfirmPassword ? 'text' : 'password'"
                placeholder="Ripeti la password"
                [(ngModel)]="confirmPassword"
                name="confirmPassword"
                minlength="8"
                required
              ></ion-input>
              <button 
                type="button" 
                class="password-toggle-btn" 
                (click)="toggleShowConfirmPassword()"
                [attr.aria-label]="showConfirmPassword ? 'Nascondi password' : 'Mostra password'"
              >
                <ion-icon [name]="showConfirmPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
              </button>
            </div>
            <small class="field-error" *ngIf="confirmPassword.length > 0 && password !== confirmPassword">
              Le password non coincidono
            </small>
          </div>

          <!-- Error -->
          <div class="error-box" *ngIf="error">
            <ion-icon name="alert-circle-outline"></ion-icon>
            <span>{{ error }}</span>
          </div>

          <!-- CTA -->
          <ion-button
            expand="block"
            class="main-btn"
            type="submit"
            [disabled]="loading"
          >
            <ion-spinner *ngIf="loading" name="crescent"></ion-spinner>
            <span *ngIf="!loading">Registrati</span>
          </ion-button>
        </form>

        <!-- Footer -->
        <div class="footer-links">
          <p>
            Hai già un account?
            <button type="button" class="link-primary" (click)="goBack()">
              Accedi
            </button>
          </p>
        </div>
      </div>

    </div>
  </div>
</ion-content>
