<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/groups" text="" icon="arrow-back"></ion-back-button>
    </ion-buttons>

    <div class="chat-header-info">
      <div class="header-avatar" [ngClass]="groupColorClass">
        <span>{{ groupName.charAt(0).toUpperCase() }}</span>
      </div>
      <div class="header-text">
        <h2>{{ groupName }}</h2>
      </div>
    </div>

    <ion-buttons slot="end">
      <ion-button>
        <ion-icon slot="icon-only" name="ellipsis-horizontal"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="messages-container">
    <div class="empty-state" *ngIf="messages.length === 0">
      Nessun messaggio ancora. Scrivi il primo qui sotto.
    </div>

    <div
      *ngFor="let m of messages"
      class="message-wrapper"
      [ngClass]="isMine(m) ? 'sent' : 'received'">
      <div class="msg-avatar">
        <img [src]="messageAvatar(m)" (error)="onMessageAvatarError($event)" alt="avatar">
      </div>

      <div class="message-bubble">
        <span class="sender-name" *ngIf="!isMine(m)">{{ m.userName }}</span>
        <p>{{ m.text }}</p>
        <span class="msg-time">{{ formatTime(m.createdAt) }}</span>
      </div>
    </div>
  </div>
</ion-content>

<ion-footer class="ion-no-border chat-footer">
  <div class="chat-input-bar">
    <div class="input-wrapper">
      <textarea
        [(ngModel)]="newMessage"
        placeholder="Scrivi un messaggio..."
        rows="1"
        (keydown.enter)="sendMessage(); $event.preventDefault()"></textarea>
    </div>

    <ion-button class="send-btn" (click)="sendMessage()" [disabled]="sending || !newMessage.trim()">
      <ion-icon slot="icon-only" name="send"></ion-icon>
    </ion-button>
  </div>
</ion-footer>
