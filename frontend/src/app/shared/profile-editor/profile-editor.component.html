<section class="editor-shell" [class.editor-shell--sheet]="variant === 'sheet'" [class.editor-shell--page]="variant === 'page'">

  <header class="editor-header">
    <div>
      <h2>{{ title }}</h2>
      <p *ngIf="subtitle">{{ subtitle }}</p>
    </div>
    <button *ngIf="showClose" type="button" class="close-btn" (click)="close()">Chiudi</button>
  </header>

  <div class="editor-body">
    <section class="block">
      <div class="block-label">Foto profilo <em>(opzionale)</em></div>
      <div class="photo-row">
        <div class="avatar-preview">
          <img [src]="profileData.avatarUrl || fallbackAvatar" (error)="onAvatarError($event)" alt="Foto profilo">
        </div>
        <button type="button" class="upload-area" (click)="uploadPhoto()" [disabled]="isLimitedProfileEdit">
          <strong>Carica un'immagine</strong>
          <span>oppure clicca per scegliere</span>
          <small>JPG, PNG, WEBP - max 5 MB</small>
        </button>
      </div>
    </section>

    <section class="form-grid">
      <label class="field">
        <span>Nome</span>
        <input type="text" maxlength="60" [(ngModel)]="profileData.firstName" placeholder="Marco" [disabled]="isLimitedProfileEdit">
      </label>

      <label class="field">
        <span>Cognome</span>
        <input type="text" maxlength="60" [(ngModel)]="profileData.lastName" placeholder="Rossi" [disabled]="isLimitedProfileEdit">
      </label>

      <label class="field field--full">
        <span>Username <em>(opzionale)</em></span>
        <input type="text" maxlength="40" [(ngModel)]="profileData.username" placeholder="marco.r">
      </label>

      <label class="field field--full" *ngIf="isLimitedProfileEdit">
        <span>Corso di laurea triennale</span>
        <input type="text" [value]="profileData.corso || '-'" readonly>
      </label>

      <label class="field field--full" *ngIf="!isLimitedProfileEdit">
        <span>Corso di laurea triennale</span>
        <select [(ngModel)]="profileData.courseKey" (ngModelChange)="onCourseChange($event)" [disabled]="isLimitedProfileEdit || courseOptions.length === 0 || academicSelectionLocked">
          <option value="" disabled>Seleziona corso</option>
          <option *ngFor="let course of courseOptions" [value]="course.key">{{ course.label }}</option>
        </select>
      </label>

      <label class="field field--full">
        <span>Bio <em>(opzionale)</em></span>
        <textarea maxlength="120" rows="4" [(ngModel)]="profileData.bio" placeholder="Scrivi una breve bio..."></textarea>
        <small class="counter">{{ bioCount }}/120</small>
      </label>
    </section>
  </div>

  <footer class="editor-footer">
    <button type="button" class="save-btn" [disabled]="!canSave()" (click)="saveProfile()">
      {{ saving ? 'Salvataggio...' : submitLabel }}
    </button>
  </footer>

  <input type="file" accept="image/jpeg,image/png,image/webp" #fileInput (change)="onFileSelected($event)" hidden>
</section>
